name: Generate GitHub contribution snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: snake
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Generate snake SVGs
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p dist
          docker run --rm \
            -e INPUT_GITHUB_USER_NAME="${{ github.repository_owner }}" \
            -e INPUT_GITHUB_TOKEN="${GITHUB_TOKEN}" \
            -e INPUT_OUTPUTS=$'dist/github-snake.svg\ndist/github-snake-dark.svg?palette=github-dark' \
            -v "${{ github.workspace }}:/github/workspace" \
            -w /github/workspace \
            platane/snk@sha256:b107f810d467a26b1e7ac46751073d1247728421155a47e77f6cd2dc66dcc74c

      - name: Publish generated files to output branch
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          REPO_URL="https://github.com/${{ github.repository }}.git"
          AUTH_HEADER="AUTHORIZATION: basic $(printf "x-access-token:%s" "${GITHUB_TOKEN}" | base64 | tr -d '\n')"

          mkdir -p publish
          cd publish

          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote add origin "${REPO_URL}"

          if git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" ls-remote --exit-code --heads "${REPO_URL}" output >/dev/null 2>&1; then
            git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" fetch --depth=1 origin output
            git checkout -B output FETCH_HEAD
          else
            git checkout --orphan output
          fi

          # Ensure branch content exactly matches generated artifacts.
          find . -mindepth 1 -maxdepth 1 ! -name .git -exec rm -rf {} +
          cp -R ../dist/. ./

          git add -A
          if git diff --cached --quiet; then
            echo "No snake changes to publish."
            exit 0
          fi

          git commit -m "chore: update contribution snake"
          git -c "http.https://github.com/.extraheader=${AUTH_HEADER}" push origin output:output

